<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos H. Zapata G. — Data Tools</title>
<meta name="description" content="Tarjeta de presentación digital de Carlos H. Zapata G., Gerente de Tecnología en Data Tools. Certificada ISO/IEC 27001:2022.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1f3c;
    --navy-2: #16335e;
    --azul: #1b3a6b;
    --verde: #1e9e50;
    --verde-neon: #34d97b;
    --oro: #e8f5e9;
    --blanco: #ffffff;
    --texto-suave: rgba(255, 255, 255, .65);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 800px at 80% -10%, #1e4a8a 0%, transparent 55%),
                radial-gradient(900px 700px at -10% 110%, #0f5c33 0%, transparent 55%),
                linear-gradient(160deg, #081226 0%, #0d1f3c 60%, #0b2d1c 100%);
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 28px 16px 48px;
    color: var(--blanco);
    overflow-x: hidden;
  }
  /* partículas decorativas */
  .orbita {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(52, 217, 123, .12);
    pointer-events: none;
    animation: girar 60s linear infinite;
  }
  .orbita.a { width: 560px; height: 560px; top: -180px; right: -160px; }
  .orbita.b { width: 820px; height: 820px; top: -300px; right: -280px; animation-duration: 90s; border-color: rgba(110, 168, 254, .10); }
  .orbita.c { width: 480px; height: 480px; bottom: -200px; left: -160px; border-color: rgba(52, 217, 123, .10); }
  @keyframes girar { to { transform: rotate(360deg); } }

  .tarjeta {
    width: 100%;
    max-width: 430px;
    position: relative;
    z-index: 1;
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.045) 100%);
    border: 1px solid rgba(255, 255, 255, .14);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow: 0 30px 80px rgba(0, 0, 0, .55), inset 0 1px 0 rgba(255,255,255,.18);
    overflow: hidden;
    animation: aparecer .8s cubic-bezier(.2,.9,.3,1) both;
  }
  @keyframes aparecer { from { opacity: 0; transform: translateY(26px) scale(.97); } }

  /* franja superior con malla de puntos */
  .hero {
    position: relative;
    height: 150px;
    background: linear-gradient(120deg, var(--azul) 0%, var(--navy-2) 45%, var(--verde) 110%);
  }
  .hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.22) 1px, transparent 1.6px);
    background-size: 18px 18px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,.9), transparent 85%);
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,.9), transparent 85%);
  }
  .hero .marca {
    position: absolute;
    top: 22px; left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 6px;
    color: rgba(255,255,255,.85);
  }
  /* línea de circuito decorativa */
  .hero svg.circuito {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 60px;
    opacity: .5;
  }

  /* logo con anillo luminoso */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-top: -72px;
    position: relative;
    z-index: 2;
  }
  .logo-anillo {
    width: 144px; height: 144px;
    border-radius: 50%;
    padding: 4px;
    background: conic-gradient(from 200deg, var(--verde-neon), #4ea1ff, var(--verde-neon));
    box-shadow: 0 0 36px rgba(52, 217, 123, .35), 0 14px 36px rgba(0,0,0,.5);
    animation: pulso 3.5s ease-in-out infinite;
  }
  @keyframes pulso {
    0%, 100% { box-shadow: 0 0 28px rgba(52,217,123,.30), 0 14px 36px rgba(0,0,0,.5); }
    50%      { box-shadow: 0 0 48px rgba(52,217,123,.55), 0 14px 36px rgba(0,0,0,.5); }
  }
  .logo-circulo {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
  }
  .logo-circulo svg { width: 62px; height: 62px; }
  .logo-texto {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2.5px;
    line-height: 1.15;
    text-align: center;
  }
  .logo-texto .d-azul { color: var(--azul); }
  .logo-texto .d-verde { color: #1e7a3c; }

  .info {
    text-align: center;
    padding: 18px 28px 0;
    animation: aparecer .8s .15s cubic-bezier(.2,.9,.3,1) both;
  }
  .info h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: .3px;
    background: linear-gradient(90deg, #fff 30%, #b9f5d2 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .info h2 {
    margin-top: 6px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--verde-neon);
  }
  .info .ubicacion {
    margin-top: 12px;
    font-size: 13.5px;
    color: var(--texto-suave);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .info .ubicacion svg { width: 15px; height: 15px; flex: none; }

  /* sello ISO elegante */
  .sello-iso {
    margin: 20px 28px 0;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(52,217,123,.12), rgba(78,161,255,.08));
    border: 1px solid rgba(52, 217, 123, .35);
    animation: aparecer .8s .25s cubic-bezier(.2,.9,.3,1) both;
  }
  .sello-iso .escudo {
    flex: none;
    width: 46px; height: 46px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--verde), var(--verde-neon));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 18px rgba(52,217,123,.35);
  }
  .sello-iso .escudo svg { width: 26px; height: 26px; }
  .sello-iso .detalle { flex: 1; text-align: left; }
  .sello-iso .norma { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: .4px; }
  .sello-iso .sub { font-size: 11.5px; color: var(--texto-suave); margin-top: 2px; }
  .sello-iso .certificada {
    flex: none;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: #06281a;
    background: var(--verde-neon);
    padding: 6px 10px;
    border-radius: 999px;
  }

  /* botones de acción circulares */
  .acciones {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 24px 28px 8px;
    animation: aparecer .8s .35s cubic-bezier(.2,.9,.3,1) both;
  }
  .acciones a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--texto-suave);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .5px;
  }
  .acciones .icono {
    width: 58px; height: 58px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    transition: transform .2s ease, background .2s ease, border-color .2s ease;
  }
  .acciones .icono svg { width: 24px; height: 24px; }
  .acciones a:hover .icono, .acciones a:active .icono {
    transform: translateY(-4px) scale(1.06);
    background: rgba(52, 217, 123, .18);
    border-color: var(--verde-neon);
  }

  /* CTA principal */
  .guardar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 18px 28px 10px;
    width: calc(100% - 56px);
    padding: 17px;
    border: none;
    border-radius: 16px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: .4px;
    color: #04220f;
    background: linear-gradient(135deg, var(--verde-neon) 0%, #7ef0ae 100%);
    box-shadow: 0 12px 30px rgba(52, 217, 123, .35);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .15s ease;
    animation: aparecer .8s .45s cubic-bezier(.2,.9,.3,1) both;
  }
  .guardar:active { transform: scale(.97); }
  .guardar::after {
    content: "";
    position: absolute;
    top: 0; left: -80%;
    width: 50%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
    animation: brillo 3.2s ease-in-out infinite;
  }
  @keyframes brillo { 0%, 55% { left: -80%; } 85%, 100% { left: 130%; } }
  .guardar svg { width: 20px; height: 20px; }

  .lema {
    text-align: center;
    font-size: 10.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    padding: 12px 28px 26px;
    animation: aparecer .8s .55s cubic-bezier(.2,.9,.3,1) both;
  }
  .lema strong { color: var(--verde-neon); font-weight: 700; }
</style>
</head>
<body>
  <div class="orbita a"></div>
  <div class="orbita b"></div>
  <div class="orbita c"></div>

  <div class="tarjeta">
    <div class="hero">
      <div class="marca">DATA&nbsp;TOOLS</div>

    <div class="info">

        <svg viewBox="0 0 24 24" fill="none" stroke="#04220f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4.5 5v6c0 5 3.4 8.6 7.5 10 4.1-1.4 7.5-5 7.5-10V5L12 2Z"/>

      </div>

        <div class="sub">Certificado por Kiwa &gt;CQR · Seguridad de la información</div>
      </div>
      <span class="certificada">CERTIFICADA</span>
    </div>

    <div class="acciones">
      <a href="tel:+573000000000">
        <span class="icono"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.13.96.36 1.9.7 2.8a2 2 0 0 1-.45 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.45c.9.34 1.84.57 2.8.7a2 2 0 0 1 1.7 2.05Z"/></svg></span>

        <span class="icono"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12.04 2a9.9 9.9 0 0 0-8.5 14.95L2 22l5.2-1.5A9.9 9.9 0 1 0 12.04 2Zm0 18.1a8.2 8.2 0 0 1-4.2-1.15l-.3-.18-3.08.9.86-3-.2-.31a8.2 8.2 0 1 1 6.92 3.74Zm4.5-6.15c-.25-.12-1.46-.72-1.7-.8-.22-.08-.39-.12-.55.12-.16.25-.63.8-.78.97-.14.16-.29.18-.53.06a6.7 6.7 0 0 1-3.35-2.93c-.25-.43.25-.4.72-1.34.08-.16.04-.3-.02-.43-.06-.12-.55-1.33-.76-1.82-.2-.48-.4-.42-.55-.43h-.47c-.16 0-.43.06-.65.3-.22.25-.85.84-.85 2.04 0 1.2.88 2.36 1 2.53.12.16 1.72 2.62 4.16 3.68.58.25 1.04.4 1.4.51.58.19 1.1.16 1.52.1.47-.07 1.46-.6 1.66-1.18.2-.57.2-1.06.15-1.17-.06-.1-.22-.16-.47-.28Z"/></svg></span>

      <a href="mailto:carlos.zapata@datatools.com.co">

    <button class="guardar" id="btnGuardar">

      Guardar contacto
    </button>

    <p class="lema">Somos <strong>tecnología</strong> · innovación · evolución</p>
  </div>

<script>
  // Datos del contacto: edita aquí teléfono y correo reales
  const contacto = {
    nombre: "Carlos H. Zapata G.",
    apellido: "Zapata",
    nombrePila: "Carlos",
    cargo: "Gerente de Tecnología",
    empresa: "Data Tools S.A.",
    telefono: "+573000000000",
    correo: "carlos.zapata@datatools.com.co",
    web: "https://www.datatools.com.co",
    direccion: "Avenida de las Américas N° 31 - 20"
  };

  document.getElementById("btnGuardar").addEventListener("click", () => {
    const vcard = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `N:${contacto.apellido};${contacto.nombrePila};;;`,
      `FN:${contacto.nombre}`,
      `ORG:${contacto.empresa}`,
      `TITLE:${contacto.cargo}`,
      `TEL;TYPE=CELL:${contacto.telefono}`,
      `EMAIL;TYPE=WORK:${contacto.correo}`,
      `URL:${contacto.web}`,
      `ADR;TYPE=WORK:;;${contacto.direccion};;;;Colombia`,
      "END:VCARD"
    ].join("\r\n");
    const blob = new Blob([vcard], { type: "text/vcard" });
    const enlace = document.createElement("a");
    enlace.href = URL.createObjectURL(blob);
    enlace.download = "Carlos-Zapata-DataTools.vcf";
    enlace.click();
    URL.revokeObjectURL(enlace.href);
  });
</script>
</body>
</html>
